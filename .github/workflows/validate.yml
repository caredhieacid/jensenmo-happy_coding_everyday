name: Validate skill

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run zero-dependency structure tests
        run: python -m unittest discover -s tests -p 'test_*.py'
