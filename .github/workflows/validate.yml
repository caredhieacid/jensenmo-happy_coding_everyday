name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run repository tests
        run: python -m unittest discover -s tests -p 'test_*.py'
      - name: Validate repository contracts
        run: python scripts/validate_repository.py
      - name: Check patch whitespace
        run: git diff-tree --check --root -r -m HEAD
      - name: Fetch pinned Codex validators
        if: matrix.python-version == '3.13'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: openai/codex
          ref: 6e5a2d6b8d148a5554fdceb6f399ca45bd1c78d9
          path: .upstream/openai-codex
          persist-credentials: false
          sparse-checkout: |
            codex-rs/skills/src/assets/samples/skill-creator/scripts
            codex-rs/skills/src/assets/samples/plugin-creator/scripts
      - name: Run Codex skill and plugin validators
        if: matrix.python-version == '3.13'
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements/ci.txt
          python .upstream/openai-codex/codex-rs/skills/src/assets/samples/skill-creator/scripts/quick_validate.py \
            skills/jensenmo-happy-coding-everyday
          python .upstream/openai-codex/codex-rs/skills/src/assets/samples/plugin-creator/scripts/validate_plugin.py .

  package:
    name: Package preview
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
      - name: Build deterministic plugin archive
        run: python scripts/package_release.py --output-dir dist
      - name: Fetch pinned Codex plugin validator
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: openai/codex
          ref: 6e5a2d6b8d148a5554fdceb6f399ca45bd1c78d9
          path: .upstream/openai-codex
          persist-credentials: false
          sparse-checkout: codex-rs/skills/src/assets/samples/plugin-creator/scripts
      - name: Validate the extracted release package
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements/ci.txt
          python -m zipfile -e dist/*.zip .release-smoke
          plugin_root=$(find .release-smoke -mindepth 1 -maxdepth 1 -type d -print -quit)
          python .upstream/openai-codex/codex-rs/skills/src/assets/samples/plugin-creator/scripts/validate_plugin.py \
            "$plugin_root"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: happycoding-plugin-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7
